<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a" rx="20"/>
  
  <!-- Code brackets -->
  <g transform="translate(50, 50)">
    <!-- Left bracket -->
    <path d="M -25 -20 L -15 -20 L -25 0 L -15 20 L -25 20" stroke="url(#faviconGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket -->
    <path d="M 25 -20 L 15 -20 L 25 0 L 15 20 L 25 20" stroke="url(#faviconGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="url(#faviconGradient)"/>
  </g>
</svg>
