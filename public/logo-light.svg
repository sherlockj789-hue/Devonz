<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="lightLogGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background (light) -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Main logo shape - stylized code brackets -->
  <g transform="translate(100, 100)">
    <!-- Left bracket -->
    <path d="M -50 -40 L -30 -40 L -50 0 L -30 40 L -50 40" stroke="url(#lightLogGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket -->
    <path d="M 50 -40 L 30 -40 L 50 0 L 30 40 L 50 40" stroke="url(#lightLogGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center dot accent -->
    <circle cx="0" cy="0" r="5" fill="url(#lightLogGradient)"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="165" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#1f2937" text-anchor="middle">codibl</text>
</svg>
